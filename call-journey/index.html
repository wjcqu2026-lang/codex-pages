<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>通话客户旅程</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f3f6fa;
      --chrome: #eef5ff;
      --chrome-2: #e5effd;
      --panel: #ffffff;
      --panel-soft: #f7f9fc;
      --panel-warm: #fbfaf7;
      --ink: #111827;
      --muted: #667085;
      --faint: #98a2b3;
      --line: #e4e8ef;
      --strong-line: #cfd7e3;
      --blue: #2563eb;
      --blue-2: #dbeafe;
      --cyan: #0e7490;
      --green: #157a55;
      --amber: #b45f06;
      --red: #b42318;
      --violet: #6d5bd0;
      --shadow: 0 14px 36px rgba(37, 72, 116, 0.09);
      --shadow-soft: 0 5px 16px rgba(37, 72, 116, 0.06);
      font-family: Inter, "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(180deg, #fbfdff 0%, var(--bg) 56%, #edf4fb 100%);
      color: var(--ink);
      font-size: 13px;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .shell {
      min-height: 100vh;
      display: grid;
      grid-template-rows: 54px 1fr;
    }

    .topbar {
      height: 54px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
      background: rgba(255, 255, 255, 0.86);
      border-bottom: 1px solid rgba(207, 215, 227, 0.76);
      backdrop-filter: blur(18px);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 260px;
    }

    .brand-mark {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: linear-gradient(145deg, #2563eb, #0e7490);
      color: #fff;
      font-weight: 800;
      letter-spacing: 0.02em;
      box-shadow: 0 7px 18px rgba(23, 33, 51, 0.18);
    }

    .brand h1 {
      margin: 0;
      font-size: 16px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .brand span {
      display: block;
      margin-top: 1px;
      color: var(--muted);
      font-size: 12px;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .search {
      width: min(32vw, 390px);
      position: relative;
    }

    .search input {
      width: 100%;
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 0 10px 0 32px;
      color: var(--ink);
      background: rgba(247, 249, 252, 0.92);
      outline: none;
      transition: border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }

    .search input:focus {
      background: #fff;
      border-color: #91b5ff;
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.10);
    }

    .search::before {
      content: "⌕";
      position: absolute;
      left: 10px;
      top: 7px;
      color: var(--muted);
      font-size: 17px;
      line-height: 1;
    }

    .primary {
      height: 34px;
      border: 0;
      border-radius: 6px;
      color: #fff;
      background: linear-gradient(135deg, #2563eb, #174fb8);
      padding: 0 12px;
      font-weight: 650;
      box-shadow: 0 7px 14px rgba(37, 99, 235, 0.18);
    }

    .layout {
      display: grid;
      grid-template-columns: 280px minmax(460px, 1fr) 380px;
      gap: 10px;
      padding: 10px;
      min-height: 0;
    }

    .panel {
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(207, 215, 227, 0.82);
      border-radius: 7px;
      box-shadow: var(--shadow-soft);
      min-width: 0;
      overflow: hidden;
      backdrop-filter: blur(18px);
    }

    .panel-head {
      min-height: 46px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, #fff, #fbfcfe);
    }

    .panel-head h2,
    .panel-head h3 {
      margin: 0;
      font-size: 14px;
      letter-spacing: 0;
      font-weight: 760;
    }

    .panel-head small {
      color: var(--faint);
      white-space: nowrap;
    }

    .filters {
      display: flex;
      gap: 6px;
      padding: 7px 8px;
      border-bottom: 1px solid var(--line);
      background: #f8fafc;
      overflow-x: auto;
    }

    .chip,
    .tab,
    .icon-button {
      min-height: 28px;
      border: 1px solid transparent;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      padding: 0 8px;
      white-space: nowrap;
      transition: background 0.18s ease, color 0.18s ease, border-color 0.18s ease;
    }

    .chip.active,
    .tab.active {
      color: #174fb8;
      border-color: #bfdbfe;
      background: #eff6ff;
      font-weight: 650;
    }

    .customer-list {
      max-height: calc(100vh - 115px);
      overflow: auto;
      padding: 6px;
    }

    .customer {
      width: 100%;
      border: 1px solid transparent;
      border-radius: 7px;
      background: #fff;
      padding: 10px;
      text-align: left;
      margin-bottom: 5px;
      transition: border-color 0.18s ease, background 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
    }

    .customer:hover {
      border-color: var(--line);
      background: #fbfcff;
    }

    .customer.active {
      background: linear-gradient(180deg, #f7fbff, #eff6ff);
      border-color: #b9d4ff;
      box-shadow: 0 10px 22px rgba(37, 99, 235, 0.12);
    }

    .customer-row {
      display: flex;
      justify-content: space-between;
      gap: 9px;
      align-items: flex-start;
    }

    .customer strong {
      display: block;
      font-size: 14px;
      margin-bottom: 3px;
      color: #101828;
    }

    .customer p {
      margin: 0;
      color: var(--muted);
      line-height: 1.35;
      font-size: 12px;
    }

    .customer-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 7px;
      color: var(--faint);
      font-size: 12px;
    }

    .mini-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #9aa8bb;
      flex: 0 0 auto;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      height: 21px;
      padding: 0 7px;
      border-radius: 999px;
      font-size: 12px;
      border: 1px solid transparent;
      white-space: nowrap;
      font-weight: 650;
    }

    .badge.hot {
      color: var(--red);
      background: #fff1f0;
      border-color: #fecdca;
    }

    .badge.warm {
      color: var(--amber);
      background: #fff7ed;
      border-color: #fed7aa;
    }

    .badge.stable {
      color: var(--green);
      background: #ecfdf3;
      border-color: #bbf7d0;
    }

    .journey {
      display: grid;
      grid-template-rows: auto auto 1fr;
      min-height: 0;
    }

    .profile {
      padding: 13px 14px 12px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(135deg, #f8fbff, #eef6ff);
      color: var(--ink);
    }

    .profile h2 {
      margin: 0 0 4px;
      font-size: 20px;
      letter-spacing: 0;
    }

    .profile p {
      margin: 0;
      color: var(--muted);
      line-height: 1.38;
    }

    .profile .badge {
      background: #eff6ff;
      border-color: #bfdbfe;
      color: #174fb8;
    }

    .profile-main {
      display: grid;
      gap: 7px;
    }

    .profile-kicker {
      display: flex;
      align-items: center;
      gap: 7px;
      color: var(--muted);
      font-size: 12px;
    }

    .profile-note {
      max-width: 780px;
      font-size: 13px;
    }

    .risk-note {
      align-self: stretch;
      min-width: 168px;
      max-width: 230px;
      border: 1px solid #cfe1ff;
      border-radius: 7px;
      padding: 9px 10px;
      background: #ffffff;
    }

    .risk-note span {
      display: block;
      margin-bottom: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .risk-note strong {
      display: block;
      color: #1d4ed8;
      font-size: 13px;
      line-height: 1.35;
    }

    .metric-strip {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 1px;
      padding: 0;
      border-bottom: 1px solid var(--line);
      background: var(--line);
    }

    .metric {
      min-height: 58px;
      border: 0;
      border-radius: 0;
      background: #fff;
      padding: 10px 12px;
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 5px;
    }

    .metric strong {
      display: block;
      font-size: 14px;
      letter-spacing: 0;
      line-height: 1.25;
    }

    .timeline {
      padding: 10px;
      overflow: auto;
      max-height: calc(100vh - 205px);
      background: #f7faff;
    }

    .journey-overview {
      display: grid;
      grid-template-columns: 1.15fr 1fr 1fr;
      gap: 8px;
      margin-bottom: 10px;
    }

    .journey-stat {
      min-width: 0;
      border: 1px solid #dce6f3;
      border-radius: 7px;
      background: #fff;
      padding: 9px 10px;
    }

    .journey-stat span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 4px;
    }

    .journey-stat strong {
      display: block;
      color: #101828;
      font-size: 13px;
      line-height: 1.25;
    }

    .journey-stat em {
      display: block;
      margin-top: 3px;
      color: var(--faint);
      font-size: 12px;
      font-style: normal;
    }

    .journey-stat.primary {
      background: linear-gradient(135deg, #eff6ff, #f6fbff);
      border-color: #bfdbfe;
    }

    .journey-list {
      display: grid;
      gap: 7px;
    }

    .call-card {
      display: grid;
      grid-template-columns: 86px minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      position: relative;
      border: 1px solid #dce6f3;
      border-radius: 8px;
      background: #fff;
      padding: 10px;
      box-shadow: 0 5px 14px rgba(37, 72, 116, 0.04);
      transition: border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }

    .call-card:hover {
      border-color: #bfd4f2;
      box-shadow: 0 8px 18px rgba(37, 72, 116, 0.07);
    }

    .call-card.active {
      border-color: #8bb7ff;
      background: linear-gradient(180deg, #ffffff, #f7fbff);
      box-shadow: 0 10px 22px rgba(37, 99, 235, 0.10);
    }

    .call-time {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
      text-align: left;
      border-right: 1px solid #e6edf6;
      padding-right: 10px;
    }

    .time-date {
      display: block;
      color: #344054;
      font-weight: 750;
      margin-bottom: 3px;
    }

    .time-hour {
      display: block;
      color: var(--blue);
      font-weight: 700;
      margin-bottom: 3px;
    }

    .call-sequence {
      display: inline-flex;
      align-items: center;
      height: 20px;
      padding: 0 6px;
      margin-bottom: 6px;
      border-radius: 999px;
      background: #eef4ff;
      color: #1d4ed8;
      font-weight: 750;
      font-size: 11px;
    }

    .call-body {
      border: 0;
      border-radius: 0;
      background: transparent;
      padding: 0;
      position: relative;
      box-shadow: none;
      min-width: 0;
    }

    .call-body::before {
      display: none;
    }

    .call-title {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
    }

    .call-title h3 {
      margin: 0 0 4px;
      font-size: 14px;
      color: #101828;
    }

    .call-kicker {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
    }

    .call-brief {
      margin: 6px 0 0;
      color: #475467;
      line-height: 1.42;
      font-size: 12px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .call-brief b {
      color: #344054;
      font-weight: 750;
    }

    .call-title p {
      margin: 0;
      color: var(--muted);
      line-height: 1.42;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 7px;
    }

    .tag {
      height: 21px;
      padding: 0 7px;
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      background: #eef2f7;
      color: #475569;
      font-size: 12px;
      font-weight: 600;
    }

    .call-actions {
      display: flex;
      gap: 6px;
      margin-top: 0;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .text-button {
      min-height: 28px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: #344054;
      padding: 0 8px;
      font-weight: 600;
      transition: background 0.18s ease, border-color 0.18s ease, color 0.18s ease;
    }

    .text-button:hover {
      border-color: #b9c5d6;
      background: #f8fafc;
    }

    .text-button.active {
      color: #fff;
      border-color: var(--blue);
      background: var(--blue);
    }

    .detail {
      display: grid;
      grid-template-rows: auto auto auto auto 1fr;
      min-height: 0;
      background: #fff;
    }

    .player {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfe;
    }

    audio {
      width: 100%;
      height: 32px;
    }

    .wave {
      height: 42px;
      display: grid;
      grid-template-columns: repeat(40, 1fr);
      align-items: center;
      gap: 2px;
      margin-bottom: 8px;
      padding: 0 4px;
      border-radius: 7px;
      background:
        linear-gradient(90deg, rgba(37, 99, 235, 0.08), rgba(14, 116, 144, 0.08)),
        #fff;
      border: 1px solid #e5eaf2;
    }

    .wave span {
      display: block;
      min-height: 6px;
      border-radius: 99px;
      background: #80a7e8;
    }

    .call-meta {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      padding: 0;
      border-bottom: 1px solid var(--line);
      background: var(--line);
    }

    .meta-item {
      background: #fff;
      border: 0;
      border-radius: 0;
      padding: 9px 10px;
      min-height: 50px;
    }

    .meta-item span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 4px;
    }

    .tabs {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 8px;
      border-bottom: 1px solid var(--line);
      background: #fff;
    }

    .transcript {
      overflow: auto;
      padding: 6px 12px 12px;
      max-height: calc(100vh - 235px);
      background: #fbfcfe;
    }

    .utterance {
      display: grid;
      grid-template-columns: 42px 1fr;
      gap: 8px;
      padding: 7px 0;
      border-bottom: 0;
    }

    .utterance:last-child {
      border-bottom: 0;
    }

    .stamp {
      color: var(--faint);
      font-size: 12px;
      padding-top: 6px;
    }

    .speaker {
      font-size: 12px;
      color: var(--teal);
      font-weight: 750;
      margin-bottom: 4px;
    }

    .utterance.agent .speaker {
      color: var(--blue);
    }

    .utterance p {
      margin: 0;
      line-height: 1.42;
      background: #fff;
      border: 1px solid #e6ebf2;
      border-radius: 7px;
      padding: 8px 9px;
      box-shadow: 0 4px 10px rgba(22, 32, 50, 0.035);
    }

    .utterance.agent p {
      background: #eff6ff;
      border-color: #cfe1ff;
    }

    .insights {
      padding: 10px 12px;
      overflow: auto;
      max-height: calc(100vh - 235px);
      background: #fbfcfe;
    }

    .insight-row {
      display: grid;
      grid-template-columns: 72px 1fr;
      gap: 8px;
      padding: 9px;
      border: 1px solid var(--line);
      border-radius: 7px;
      margin-bottom: 6px;
      background: #fff;
    }

    .insight-row:last-child {
      border-bottom: 0;
    }

    .insight-row b {
      color: var(--cyan);
      font-size: 12px;
    }

    .empty {
      color: var(--muted);
      padding: 18px;
      text-align: center;
    }

    @media (max-width: 1180px) {
      .layout {
        grid-template-columns: 260px 1fr;
      }

      .detail {
        grid-column: 1 / -1;
      }

      .transcript,
      .insights {
        max-height: none;
      }
    }

    @media (max-width: 780px) {
      .shell {
        grid-template-rows: auto 1fr;
      }

      .topbar {
        height: auto;
        padding: 14px;
        align-items: stretch;
        flex-direction: column;
        gap: 12px;
        position: static;
      }

      .brand {
        min-width: 0;
      }

      .top-actions,
      .search {
        width: 100%;
      }

      .top-actions {
        align-items: stretch;
        flex-direction: column;
      }

      .primary {
        width: 100%;
      }

      .layout {
        grid-template-columns: 1fr;
        padding: 10px;
      }

      .customer-list,
      .timeline {
        max-height: none;
      }

      .metric-strip,
      .summary,
      .call-meta {
        grid-template-columns: 1fr;
      }

      .profile {
        grid-template-columns: 1fr;
      }

      .profile-kicker {
        flex-wrap: wrap;
      }

      .risk-note {
        max-width: none;
        min-width: 0;
      }

      .call-card {
        grid-template-columns: 1fr;
      }

      .call-card::before,
      .call-body::before {
        display: none;
      }

      .call-time {
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">CJ</div>
        <div>
          <h1>通话客户旅程</h1>
          <span>历史记录、通话总结、录音与交互文本</span>
        </div>
      </div>
      <div class="top-actions">
        <label class="search" aria-label="搜索客户或通话内容">
          <input id="searchInput" type="search" placeholder="搜索客户、手机号、摘要或文本">
        </label>
        <button class="primary" id="todayButton">今日待跟进</button>
      </div>
    </header>

    <main class="layout">
      <aside class="panel">
        <div class="panel-head">
          <h2>客户</h2>
          <small id="customerCount"></small>
        </div>
        <div class="filters">
          <button class="chip active" data-stage="all">全部</button>
          <button class="chip" data-stage="hot">高意向</button>
          <button class="chip" data-stage="warm">跟进中</button>
          <button class="chip" data-stage="stable">已成交</button>
        </div>
        <div class="customer-list" id="customerList"></div>
      </aside>

      <section class="panel journey">
        <div class="profile" id="profile"></div>
        <div class="metric-strip" id="metrics"></div>
        <div class="timeline" id="timeline"></div>
      </section>

      <section class="panel detail">
        <div class="panel-head">
          <div>
            <h3 id="detailTitle">通话详情</h3>
            <small id="detailSub"></small>
          </div>
          <button class="icon-button" id="copyButton" title="复制摘要">复制摘要</button>
        </div>
        <div class="player">
          <div class="wave" id="waveform" aria-label="录音波形"></div>
          <audio id="audioPlayer" controls></audio>
        </div>
        <div class="call-meta" id="callMeta"></div>
        <div class="tabs">
          <button class="tab active" data-tab="transcript">交互文本</button>
          <button class="tab" data-tab="insights">关键信息</button>
        </div>
        <div id="detailContent"></div>
      </section>
    </main>
  </div>

  <script>
    const beep = "data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAESsAACJWAAACABAAZGF0YQAAAAA=";

    const customers = [
      {
        id: "c1",
        name: "林晓然",
        phone: "138 2046 8801",
        company: "青禾智能制造",
        owner: "王倩",
        stage: "hot",
        stageLabel: "高意向",
        summary: "正在评估售后质检与坐席培训方案，预算已初步确认。",

    let activeStage = "all";
    let activeCustomerId = customers[0].id;
    let activeCallId = customers[0].calls[0].id;
    let activeTab = "transcript";

    const customerList = document.getElementById("customerList");
    const customerCount = document.getElementById("customerCount");
    const profile = document.getElementById("profile");
    const metrics = document.getElementById("metrics");
    const timeline = document.getElementById("timeline");
    const detailTitle = document.getElementById("detailTitle");
    const detailSub = document.getElementById("detailSub");
    const callMeta = document.getElementById("callMeta");
    const detailContent = document.getElementById("detailContent");
    const searchInput = document.getElementById("searchInput");
    const waveform = document.getElementById("waveform");
    const audioPlayer = document.getElementById("audioPlayer");

    function getActiveCustomer() {
      return customers.find((customer) => customer.id === activeCustomerId) || customers[0];
    }

    function getActiveCall() {
      const customer = getActiveCustomer();
      return customer.calls.find((call) => call.id === activeCallId) || customer.calls[0];
    }

    function renderCustomers() {
      const query = searchInput.value.trim().toLowerCase();
      const filtered = customers.filter((customer) => {
        const haystack = [
          customer.name,
          customer.phone,
          customer.company,
          customer.summary,
          ...customer.calls.flatMap((call) => [
            call.title,
            call.summary,
            call.outcome,
            ...call.transcript.map((item) => item[2])
          ])
        ].join(" ").toLowerCase();
        const stageMatch = activeStage === "all" || customer.stage === activeStage;
        return stageMatch && haystack.includes(query);
      });

      customerCount.textContent = `${filtered.length} 位`;
      customerList.innerHTML = filtered.map((customer) => `
        <button class="customer ${customer.id === activeCustomerId ? "active" : ""}" data-customer="${customer.id}">
          <div class="customer-row">
            <div>
              <strong>${customer.name}</strong>
              <p>${customer.company}</p>
              <p>${customer.summary}</p>
              <div class="customer-meta">
                <span>${customer.phone}</span>
                <span class="mini-dot"></span>
                <span>${customer.calls.length} 通通话</span>
              </div>
            </div>
            <span class="badge ${customer.stage}">${customer.stageLabel}</span>
          </div>
        </button>
      `).join("") || `<div class="empty">没有匹配的客户</div>`;
    }

    function renderProfile() {
      const customer = getActiveCustomer();
      profile.innerHTML = `
        <div class="profile-main">
          <div class="profile-kicker">
            <span>${customer.company}</span>
            <span class="mini-dot"></span>
            <span>负责人 ${customer.owner}</span>
            <span class="mini-dot"></span>
            <span>${customer.phone}</span>
          </div>
          <div>
            <h2>${customer.name}</h2>
            <p class="profile-note">${customer.summary}</p>
          </div>
        </div>
        <div class="risk-note">
          <span>当前风险</span>
          <strong>${customer.risk}</strong>
        </div>
      `;

      const totalDuration = customer.calls.reduce((sum, call) => {
        const [min, sec] = call.duration.split(":").map(Number);
        return sum + min * 60 + sec;
      }, 0);
      const last = customer.calls[0];
      const avgMinutes = Math.round(totalDuration / customer.calls.length / 60);
      metrics.innerHTML = [
        ["历史通话", `${customer.calls.length} 通`],
        ["最近通话", `${last.date} ${last.time}`],
        ["平均时长", `${avgMinutes} 分钟`],
        ["下一步", customer.next]
      ].map(([label, value]) => `<div class="metric"><span>${label}</span><strong>${value}</strong></div>`).join("");
    }

    function renderTimeline() {
      const customer = getActiveCustomer();
      const latest = customer.calls[0];
      timeline.innerHTML = `
        <div class="journey-overview">
          <div class="journey-stat primary">
            <span>旅程状态</span>
            <strong>${customer.stageLabel}</strong>
            <em>${customer.calls.length} 通历史通话</em>
          </div>
          <div class="journey-stat">
            <span>最近触达</span>
            <strong>${latest.date.slice(5)} ${latest.time}</strong>
            <em>${latest.outcome}</em>
          </div>
          <div class="journey-stat">
            <span>下一动作</span>
            <strong>${customer.next}</strong>
          </div>
        </div>
        <div class="journey-list">
          ${customer.calls.map((call, index) => `
            <article class="call-card ${call.id === activeCallId ? "active" : ""}" data-call="${call.id}" data-action="detail">
              <div class="call-time">
                <span class="call-sequence">${String(index + 1).padStart(2, "0")}</span>
                <span class="time-date">${call.date.slice(5)}</span>
                <span class="time-hour">${call.time}</span>
                <span>${call.direction} · ${call.duration}</span>
              </div>
              <div class="call-body">
                <div class="call-title">
                  <div>
                    <h3>${call.title}</h3>
                    <div class="call-kicker">
                      <span>坐席 ${call.agent}</span>
                      <span>结果 ${call.outcome}</span>
                      <span>情绪 ${call.sentiment}</span>
                    </div>
                    <p class="call-brief"><b>总结</b> ${call.summary}</p>
                  </div>
                  <span class="badge ${customer.stage}">${call.outcome}</span>
                </div>
                <div class="tags">${call.tags.map((tag) => `<span class="tag">${tag}</span>`).join("")}</div>
              </div>
              <div class="call-actions">
                <button class="text-button ${call.id === activeCallId ? "active" : ""}" data-call="${call.id}" data-action="detail">详情</button>
                <button class="text-button" data-call="${call.id}" data-action="play">录音</button>
                <button class="text-button" data-call="${call.id}" data-action="text">文本</button>
              </div>
            </article>
          `).join("")}
        </div>
      `;
    }

    function renderWave() {
      waveform.innerHTML = "";
      for (let index = 0; index < 40; index += 1) {
        const bar = document.createElement("span");
        const height = 7 + Math.abs(Math.sin(index * 0.58) * 25) + (index % 5);
        bar.style.height = `${Math.round(height)}px`;
        bar.style.background = index < 15 ? "#1d65d8" : index < 28 ? "#087f8c" : "#9fb2c8";
        waveform.appendChild(bar);
      }
    }

    function renderDetails() {
      const customer = getActiveCustomer();
      const call = getActiveCall();
      detailTitle.textContent = call.title;
      detailSub.textContent = `${customer.name} · ${call.date} ${call.time} · ${call.duration}`;
      audioPlayer.src = beep;
      callMeta.innerHTML = [
        ["坐席", call.agent],
        ["结果", call.outcome],
        ["情绪", call.sentiment]
      ].map(([label, value]) => `<div class="meta-item"><span>${label}</span><strong>${value}</strong></div>`).join("");

      if (activeTab === "transcript") {
        detailContent.innerHTML = `
          <div class="transcript">
            ${call.transcript.map(([stamp, speaker, text]) => `
              <div class="utterance ${speaker === "agent" ? "agent" : ""}">
                <div class="stamp">${stamp}</div>
                <div>
                  <div class="speaker">${speaker === "agent" ? "坐席" : "客户"}</div>
                  <p>${text}</p>
                </div>
              </div>
            `).join("")}
          </div>
        `;
      } else {
        detailContent.innerHTML = `
          <div class="insights">
            ${call.insights.map(([label, value]) => `
              <div class="insight-row">
                <b>${label}</b>
                <div>${value}</div>
              </div>
            `).join("")}
          </div>
        `;
      }
    }

    function render() {
      renderCustomers();
      renderProfile();
      renderTimeline();
      renderWave();
      renderDetails();
      document.querySelectorAll(".tab").forEach((tab) => {
        tab.classList.toggle("active", tab.dataset.tab === activeTab);
      });
      document.querySelectorAll(".chip").forEach((chip) => {
        chip.classList.toggle("active", chip.dataset.stage === activeStage);
      });
    }

    customerList.addEventListener("click", (event) => {
      const button = event.target.closest("[data-customer]");
      if (!button) return;
      activeCustomerId = button.dataset.customer;
      activeCallId = getActiveCustomer().calls[0].id;
      activeTab = "transcript";
      render();
    });

    timeline.addEventListener("click", (event) => {
      const button = event.target.closest("[data-call]");
      if (!button) return;
      activeCallId = button.dataset.call;
      activeTab = button.dataset.action === "text" ? "transcript" : activeTab;
      render();
      if (button.dataset.action === "play") {
        audioPlayer.play().catch(() => {});
      }
    });

    document.querySelector(".filters").addEventListener("click", (event) => {
      const button = event.target.closest("[data-stage]");
      if (!button) return;
      activeStage = button.dataset.stage;
      renderCustomers();
      document.querySelectorAll(".chip").forEach((chip) => {
        chip.classList.toggle("active", chip.dataset.stage === activeStage);
      });
    });

    document.querySelector(".tabs").addEventListener("click", (event) => {
      const button = event.target.closest("[data-tab]");
      if (!button) return;
      activeTab = button.dataset.tab;
      renderDetails();
      document.querySelectorAll(".tab").forEach((tab) => {
        tab.classList.toggle("active", tab.dataset.tab === activeTab);
      });
    });

    searchInput.addEventListener("input", renderCustomers);

    document.getElementById("todayButton").addEventListener("click", () => {
      searchInput.value = "下一步";
      activeStage = "all";
      render();
    });

    document.getElementById("copyButton").addEventListener("click", async () => {
      const call = getActiveCall();
      const text = `通话总结：${call.summary}\n下一步：${call.nextStep}`;
      try {
        await navigator.clipboard.writeText(text);
        document.getElementById("copyButton").textContent = "已复制";
        setTimeout(() => {
          document.getElementById("copyButton").textContent = "复制摘要";
        }, 1200);
      } catch (error) {
        window.prompt("复制摘要", text);
      }
    });

    render();
  </script>
